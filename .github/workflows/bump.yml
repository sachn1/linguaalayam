name: Bump Version

on:
  push:
    branches:
      - master

jobs:
  bump:
    name: Bump Version
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'bump:') && !contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BUMP_TOKEN }}

      - name: Install Poetry and Commitizen
        run: pip install poetry commitizen

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: |
          EXIT=0
          cz bump --yes || EXIT=$?
          if [ "$EXIT" -ne 0 ] && [ "$EXIT" -ne 3 ] && [ "$EXIT" -ne 21 ]; then
            exit $EXIT
          fi

      - name: Push
        run: |
          git push origin HEAD:master
          git push origin --tags
