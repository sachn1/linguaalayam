name: Deploy to VPS

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Bump Version"]
    types: [completed]

env:
  IMAGE: ghcr.io/sachn1/linguaalayam-app

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - id: version
        run: echo "version=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=registry,ref=${{ env.IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE }}:cache,mode=max
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest

  deploy:
    name: Deploy to Hetzner VPS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Run migrations and restart app
        uses: appleboy/ssh-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          VERSION: ${{ needs.build.outputs.version }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GH_TOKEN,GH_SHA,VERSION
          script: |
            set -e
            cd /root/linguaalayam

            curl -fsSL \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.raw" \
              "https://api.github.com/repos/sachn1/linguaalayam/contents/docker-compose.yml?ref=${GH_SHA}" \
              -o docker-compose.yml

            docker compose up -d db
            docker compose exec db sh -c \
              'until pg_isready -U postgres; do sleep 1; done'

            docker compose pull app
            docker compose run --rm app python -m alembic upgrade head
            docker compose up -d app

            echo "Deployed ${VERSION}"
