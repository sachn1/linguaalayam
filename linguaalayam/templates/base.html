<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}LinguAalayam{% endblock %} — Every word, explained.</title>
  <meta name="description" content="Ask about any Malayalam or English word — meanings, translations, and usage, powered by multiple lexical sources." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#b45309" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/static/sw.js");
    }
    htmx.on("htmx:configRequest", function (evt) {
      const key = localStorage.getItem("llm_key");
      const provider = localStorage.getItem("llm_provider");
      if (key) {
        evt.detail.headers["X-LLM-Key"] = key;
        evt.detail.headers["X-LLM-Provider"] = provider || "anthropic";
      }
    });
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf9;
      --surface: #ffffff;
      --border: #e5e5e5;
      --text: #1c1917;
      --text-muted: #78716c;
      --accent: #b45309;
      --accent-hover: #92400e;
      --radius: 8px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .ml { font-family: 'Noto Sans Malayalam', sans-serif; }

    header {
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    header a { text-decoration: none; color: inherit; display: flex; align-items: center; gap: 0.75rem; }
    header h1 { font-size: 1.125rem; font-weight: 600; }
    header .tagline { font-size: 0.8rem; color: var(--text-muted); }

    main { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }

    .search-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .search-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.6rem 0.875rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: var(--accent); }

    select {
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-family: inherit;
      background: var(--surface);
      outline: none;
      cursor: pointer;
    }

    .hint { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem; }

    #results { min-height: 2rem; }

    .htmx-indicator { opacity: 0; transition: opacity 0.15s; }
    .htmx-request .htmx-indicator { opacity: 1; }
    .spinner {
      display: inline-block;
      width: 1rem; height: 1rem;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-left: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    details.advanced { margin-top: 0.75rem; }
    details.advanced summary {
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
      width: fit-content;
    }
    details.advanced summary:hover { color: var(--accent); }
    .advanced-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
      flex-wrap: wrap;
    }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      margin-top: 3rem;
    }
    footer a { color: var(--text-muted); display: inline-flex; align-items: center; gap: 0.3rem; }
    footer svg { width: 14px; height: 14px; fill: currentColor; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <a href="/">
      <h1>Lingu<span class="ml">ആലയം</span></h1>
      <span class="tagline"><span class="ml">ഏതു വാക്കും അറിയൂ</span> &nbsp;·&nbsp; Every word, explained.</span>
    </a>
    <nav style="margin-left:auto;">
      <a href="/settings" style="font-size:0.8rem;color:var(--text-muted);text-decoration:none;" title="LLM settings">⚙ Settings</a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <a href="/docs" target="_blank">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/></svg>
      API docs
    </a>
    &nbsp;·&nbsp;
    <a href="https://github.com/sachn1/linguaalayam" target="_blank">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
      GitHub
    </a>
  </footer>
</body>
</html>
