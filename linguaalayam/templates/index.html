{% extends "base.html" %}

{% block content %}
<div class="search-box">
  <div class="search-row">
    <input
      id="query"
      type="text"
      name="query"
      placeholder="Search a word… e.g. run, ഓടുക, ephemeral"
      autofocus
      autocomplete="off"
      hx-get="/search"
      hx-trigger="input delay:350ms, keyup[key=='Enter']"
      hx-target="#results"
      hx-include="#mode,#source"
      hx-indicator="#spinner"
    />
    <span id="spinner" class="htmx-indicator"><span class="spinner"></span></span>
  </div>
  <details class="advanced">
    <summary>Advanced</summary>
    <div class="advanced-row">
      <select id="mode" name="mode">
        <option value="fuzzy">Quick</option>
        <option value="exact">Exact</option>
        <option value="semantic">Smart</option>
      </select>
      <select id="source" name="source">
        <option value="">All sources</option>
        <option value="olam_enml">Olam (EN→ML)</option>
        <option value="datuk">Datuk (ML→ML)</option>
        <option value="ekkurup">Ekkurup (thesaurus)</option>
      </select>
    </div>
  </details>
</div>

<div id="results"></div>
{% endblock %}
